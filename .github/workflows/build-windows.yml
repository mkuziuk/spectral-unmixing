name: Build Windows .exe

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe
        run: |
          pyinstaller spectral-unmixing.spec --clean --noconfirm

      - name: Create release archive
        run: |
          Compress-Archive -Path dist/spectral-unmixing.exe -DestinationPath spectral-unmixing-windows.zip

      - name: Upload artifact (all pushes)
        uses: actions/upload-artifact@v4
        with:
          name: spectral-unmixing-windows
          path: spectral-unmixing-windows.zip

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: spectral-unmixing-windows.zip
          generate_release_notes: true
          draft: false
          prerelease: false
